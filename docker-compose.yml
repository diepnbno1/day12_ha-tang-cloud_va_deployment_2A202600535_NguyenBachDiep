services:
  agent:
    build:
      context: .
      target: runtime
    expose:
      - "8000"
    environment:
      ENVIRONMENT: staging
      APP_NAME: Production AI Agent
      APP_VERSION: "1.0.0"
      PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      AGENT_API_KEY: ${AGENT_API_KEY:-dev-key-change-me}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      DEMO_USERNAME: ${DEMO_USERNAME:-admin}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-secret}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      ADMIN_RATE_LIMIT_PER_MINUTE: ${ADMIN_RATE_LIMIT_PER_MINUTE:-100}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD:-10.0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
